<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Terminal | Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="active">01_HOME</a>
        <a href="about.html">02_ABOUT</a>
        <a href="projects.html">03_PROJECTS</a>
    </nav>

    <div class="terminal-window">
        <header class="card-header">
            <span>SYSTEM_OS [VER_12.0]</span>
            <span>STATUS: ONLINE</span>
        </header>
        <div class="dashboard-content">
            <aside class="sidebar">
                <div class="photo-box">
                    <img src="images/profile.jpg" alt="Profile">
                </div>
                <div class="stats-box">
                    <p>RANK: OFFICER</p>
                    <h1>SUVD ERDENETSOGT</h1>
                    <p>ID: 12B67-PX-2026</p>
                </div>
            </aside>
            <main class="main-display">
                <div id="typewriter-logs"></div>
            </main>
        </div>
        <footer>PROPERTY_OF_ULAANBAATAR_POLICE_DEPT_DETECTION_UNIT</footer>
    </div>

    <script>
      const terminal = document.getElementById('typewriter-logs');
      // The \n creates the new lines you need!
      const text = "> INITIALIZING_SYSTEM... [OK]\n" +
                   "> WELCOME, USER. ALL SYSTEMS ARE FUNCTIONAL.\n" +
                   "> AUTHORIZATION GRANTED TO THE ABOVE USER.\n\n" +
                   "> LOADING PORTFOLIO DATA...\n" +
                   "> THIS PORTFOLIO REPRESENTS THE TERMINAL INTERFACE FOR ICT.";

      let i = 0;
      function typeWriter() {
        if (i < text.length) {
          terminal.innerText += text.charAt(i);
          i++;
          setTimeout(typeWriter, 40);
        }
      }
      typeWriter();
    </script>
</body>
</html>
