<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal | Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="screen-reflection"></div>
    
    <nav>
        <a href="index.html" class="active" onmouseover="playHover()">01_HOME</a>
        <a href="about.html" onmouseover="playHover()">02_ABOUT</a>
        <a href="projects.html" onmouseover="playHover()">03_PROJECTS</a>
    </nav>

    <div class="terminal-window">
        <header class="card-header">
            <div class="header-left">
                <span class="glitch-text">SYSTEM_OS [VER_12.0]</span>
                <span id="live-clock" style="margin-left: 20px; color: #fff;">00:00:00</span>
            </div>
            <div class="header-right">
                <span id="coordinates">LOC: 47.9188° N, 106.9175° E</span>
                <span style="margin-left: 20px;">STATUS: ONLINE</span>
            </div>
        </header>
        <div class="dashboard-content">
            <aside class="sidebar">
                <div class="photo-box">
                    <img src="images/profile.jpg" alt="Profile">
                    <div class="scanline-overlay"></div>
                </div>
                <div class="stats-box">
                    <p class="label">RANK: OFFICER</p>
                    <h1>SUVD ERDENETSOGT</h1>
                    <p class="label">ID: 12B67-PX-2026</p>
                </div>
            </aside>
            <main class="main-display">
                <div id="typewriter-logs"></div>
            </main>
        </div>
        <footer>PROPERTY_OF_ULAANBAATAR_POLICE_DEPT_DETECTION_UNIT</footer>
    </div>

    <script>
      const typeSound = new Audio('https://codesandbox.io/api/v1/sandboxes/626z2/assets/typewriter.mp3');
      const hoverSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
      typeSound.volume = 0.15;
      hoverSound.volume = 0.1;

      const terminal = document.getElementById('typewriter-logs');
      const text = "> INITIALIZING_REALISM_MODE... [OK]\n" +
                   "> CALIBRATING_CRT_MONITOR... [DONE]\n" +
                   "> WELCOME, OFFICER ERDENETSOGT.\n\n" +
                   "> SECURITY_CLEARANCE: LEVEL_4\n" +
                   "> DATA_ENCRYPTION: ACTIVE\n" +
                   "> SYSTEM_READY_FOR_INPUT...";

      let i = 0;
      function typeWriter() {
        if (i < text.length) {
          terminal.innerText += text.charAt(i);
          if (text.charAt(i) !== " " && i % 2 === 0) {
              typeSound.currentTime = 0;
              typeSound.play().catch(e => {});
          }
          i++;
          setTimeout(typeWriter, 40);
        }
      }
      setTimeout(typeWriter, 1200);

      function playHover() {
          hoverSound.currentTime = 0;
          hoverSound.play().catch(e => {});
      }

      function updateClock() {
        const now = new Date();
        const timeString = now.getHours().toString().padStart(2, '0') + ":" + 
                           now.getMinutes().toString().padStart(2, '0') + ":" + 
                           now.getSeconds().toString().padStart(2, '0');
        document.getElementById('live-clock').innerText = "SYS_TIME: " + timeString;
      }
      setInterval(updateClock, 1000);
      updateClock();

      setInterval(() => {
        const coords = document.getElementById('coordinates');
        coords.style.opacity = Math.random() > 0.95 ? "0.3" : "1";
      }, 80);
    </script>
</body>
</html>
