<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal | Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="active">01_HOME</a>
        <a href="about.html">02_ABOUT</a>
        <a href="projects.html">03_PROJECTS</a>
    </nav>

    <div class="terminal-window">
        <header class="card-header">
            <div class="header-left">
                <span>SYSTEM_OS [VER_12.0]</span>
                <span id="live-clock" style="margin-left: 20px; color: #fff;">00:00:00</span>
            </div>
            <div class="header-right">
                <span id="coordinates">LOC: 47.9188° N, 106.9175° E</span>
                <span style="margin-left: 20px;">STATUS: ONLINE</span>
            </div>
        </header>
        <div class="dashboard-content">
            <aside class="sidebar">
                <div class="photo-box">
                    <img src="images/profile.jpg" alt="Profile">
                </div>
                <div class="stats-box">
                    <p>RANK: OFFICER</p>
                    <h1>SUVD ERDENETSOGT</h1>
                    <p>ID: 12B67-PX-2026</p>
                </div>
            </aside>
            <main class="main-display">
                <div id="typewriter-logs"></div>
            </main>
        </div>
        <footer>PROPERTY_OF_ULAANBAATAR_POLICE_DEPT_DETECTION_UNIT</footer>
    </div>

    <script>
      // TYPEWRITER SCRIPT
      const terminal = document.getElementById('typewriter-logs');
      const text = "> INITIALIZING_SYSTEM... [OK]\n" +
                   "> WELCOME, USER. ALL SYSTEMS ARE FUNCTIONAL.\n" +
                   "> AUTHORIZATION GRANTED TO THE ABOVE USER.\n\n" +
                   "> LOADING PORTFOLIO DATA...\n" +
                   "> ACCESSING ULAANBAATAR CENTRAL HUB...";

      let i = 0;
      function typeWriter() {
        if (i < text.length) {
          terminal.innerText += text.charAt(i);
          i++;
          setTimeout(typeWriter, 40);
        }
      }
      typeWriter();

      // LIVE CLOCK SCRIPT
      function updateClock() {
        const now = new Date();
        const timeString = now.getHours().toString().padStart(2, '0') + ":" + 
                           now.getMinutes().toString().padStart(2, '0') + ":" + 
                           now.getSeconds().toString().padStart(2, '0');
        document.getElementById('live-clock').innerText = "SYS_TIME: " + timeString;
      }
      setInterval(updateClock, 1000);
      updateClock();

      // COORDINATE FLICKER SCRIPT (Makes them look like they are searching)
      setInterval(() => {
        const coords = document.getElementById('coordinates');
        coords.style.opacity = Math.random() > 0.9 ? "0.5" : "1";
      }, 100);
    </script>
</body>
</html>
